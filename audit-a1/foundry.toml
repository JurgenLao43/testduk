[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# Enhanced fuzzing/invariant settings
optimizer = true
optimizer_runs = 200
fuzz = { runs = 512, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 64, call_override = false, fail_on_revert = false }
gas_reports = ["*"]
ffi = false

[rpc_endpoints]
# Use MAINNET_RPC_URL env (Arbitrum here) by default in tests
default = "${MAINNET_RPC_URL}"